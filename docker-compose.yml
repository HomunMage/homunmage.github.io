services:
  pages:
    build:
      context: ./pages
    ports:
      - "127.0.0.1:14001:4000"
      - "127.0.0.1:35729:35729"
    volumes:
      - ./pages:/site
      - bundle_cache:/usr/local/bundle
    command: >
      bash -c "bundle install && bundle exec jekyll serve --host 0.0.0.0 --livereload --force_polling"
    tty: true
    stdin_open: true

  browser:
    profiles:
      - browser
    build:
      context: ./browser
    network_mode: host
    volumes:
      - ./browser:/app
      - ./.browser:/output
    environment:
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    tty: true
    stdin_open: true

volumes:
  bundle_cache:
