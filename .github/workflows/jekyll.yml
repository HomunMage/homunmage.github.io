name: Build Jekyll site
on:
 push:
   branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'  # This will recursively clone submodules
          fetch-depth: 0  # Fetch all history for .GitInfo and .Lastmod
      - name: Build Jekyll via Docker
        run: |
          docker build -t jekyll-build ./pages
          docker run --rm -v ${{ github.workspace }}/pages:/site jekyll-build bash -c "bundle install && bundle exec jekyll build"
      - name: Copy raw .md files to _site
        run: |
          sudo chmod -R a+w pages/_site
          find ./pages -name '*.md' -not -path '*/_layouts/*' -not -path '*/_includes/*' | while read f; do dest="pages/_site/${f#./pages/}" && mkdir -p "$(dirname "$dest")" && cp "$f" "$dest"; done
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/_site
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
